# Tracked sources — plug and play.
# Add any entry below, restart the dashboard, done.
#
# Supported types:
#   lighter     -> pool_id (public pool — URL shown in alerts)
#   hyperliquid -> address loaded from HL_ADDRESS env var
#   binance     -> credentials loaded from BINANCE_API_KEY + BINANCE_API_SECRET env vars
#                  (one-way mode only; hedge mode → source skipped with a clear error)
#
# All types share:
#   name              — label shown on dashboard and in Telegram alerts
#   min_notional_usd  — optional per-source alert threshold (default 1000)
#
# Security rules (enforced in code):
#   - HL wallet address  → lives in .env only (HL_ADDRESS); never in this file
#   - Binance API creds  → live in .env only (BINANCE_API_KEY / BINANCE_API_SECRET)
#   - url=""             → HL and Binance sources never expose account info in TG

sources:
  - type: lighter
    name: "My NK pool"
    pool_id: 281474976684763

  - type: hyperliquid
    name: "HL"
    # address loaded from HL_ADDRESS env var
    min_notional_usd: 10

  - type: binance
    name: "Binance"
    min_notional_usd: 100
    # credentials in .env: BINANCE_API_KEY + BINANCE_API_SECRET