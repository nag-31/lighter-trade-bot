# ═══════════════════════════════════════════════════════════════════════════════
# SETTINGS — tweak these without touching any Python code
# Restart the bot after any change: sudo systemctl restart lighterbot
# ═══════════════════════════════════════════════════════════════════════════════

settings:

  # ── Position size filter ─────────────────────────────────────────────────
  # Minimum position notional (USD) to fire a Telegram alert.
  # Per-source overrides in the sources list below take priority.
  # Set to 0 to alert on every fill regardless of size.
  default_min_notional_usd: 900

  # ── Alert types ──────────────────────────────────────────────────────────
  # Toggle which events send a Telegram message.
  # The dashboard always shows all events regardless of these flags.
  alert_on_open: true          # new position opened
  alert_on_close: true         # position fully closed  (always fires — position is gone)
  alert_on_size_change: true   # same-side adds to an existing position (batched)
  alert_on_reduce: true        # partial closes / reduce-only fills (batched)

  # ── Batching window ──────────────────────────────────────────────────────
  # SIZE_CHANGE and REDUCE fills that arrive within this window are merged into
  # a single alert showing total notional + fill count.
  # Lower = more real-time but noisier. Higher = cleaner but delayed.
  aggregate_window_seconds: 60

  # ── Timing ───────────────────────────────────────────────────────────────
  # How often the REST safety-net polls for any fills the WebSocket missed.
  rest_poll_seconds: 60

  # How often positions are re-synced from the exchange API to catch silent closes.
  reconciler_interval_seconds: 30

  # ── Duplicate suppression ────────────────────────────────────────────────
  # Identical Telegram messages within this window are silently dropped.
  # Protects against double-alerts when two bot instances briefly overlap.
  tg_dedup_window_seconds: 90

  # ── Dashboard ────────────────────────────────────────────────────────────
  dashboard_port: 8080
  max_recent_events: 200       # rows visible in the browser event table


# ═══════════════════════════════════════════════════════════════════════════════
# SOURCES — one entry per tracked pool / wallet / account
# ═══════════════════════════════════════════════════════════════════════════════
#
# Supported types:
#   lighter     → pool_id required (public pool URL shown in alerts)
#   hyperliquid → wallet address loaded from HL_ADDRESS env var (never put it here)
#   binance     → credentials loaded from BINANCE_API_KEY + BINANCE_API_SECRET env vars
#                 (one-way / BOTH mode only; hedge mode → source disabled with clear error)
#
# All source types share:
#   name              — label shown on dashboard and in Telegram alerts
#   min_notional_usd  — per-source override (default: settings.default_min_notional_usd)
#   footer_url        — optional public URL appended to alerts (HL/Binance only)
#
# Security rules (enforced in code):
#   - HL wallet address  → .env only (HL_ADDRESS);                     never here
#   - Binance API creds  → .env only (BINANCE_API_KEY / _SECRET);      never here
#   - Lighter pool URL   → safe to show (it's a public URL)
#   - footer_url         → only put a public website here, NOT an account URL

sources:
  - type: lighter
    name: "My NK pool"
    pool_id: 281474976684763

  - type: hyperliquid
    name: "HL"
    # address loaded from HL_ADDRESS env var
    min_notional_usd: 900
    footer_url: "https://enkapital.xyz"   # ← your public website e.g. https://enkapital.com

  # Binance disabled — source is HTTP 451 geo-blocked from the current region.
  # Re-enable (uncomment) once the Singapore VPS / SOCKS5 proxy is in place.
  # - type: binance
  #   name: "Binance"
  #   min_notional_usd: 900
  #   # credentials in .env: BINANCE_API_KEY + BINANCE_API_SECRET
